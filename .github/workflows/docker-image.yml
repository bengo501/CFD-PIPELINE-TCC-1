name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build backend image (raiz do repo)
      run: docker build . --file docker/Dockerfile --build-arg WITH_BLENDER=1 --tag cfd-pipeline-backend:${{ github.sha }}
